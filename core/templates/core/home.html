{% extends 'core/base.html' %}
{% block content %}
<div class="jumbotron text-center">
    <h1 class="display-4">Добро пожаловать в LangTrainer!</h1>
    <p class="lead">Тренажёр для изучения английских слов с интервальными повторениями.</p>
    <hr class="my-4">
    {% if user.is_authenticated %}
        <a class="btn btn-primary btn-lg" href="{% url 'review' %}" role="button">Начать повторение</a>
    {% else %}
        <a class="btn btn-primary btn-lg" href="{% url 'register' %}" role="button">Зарегистрироваться</a>
        <a class="btn btn-secondary btn-lg" href="{% url 'login' %}" role="button">Войти</a>
    {% endif %}
</div>
{% endblock %}
